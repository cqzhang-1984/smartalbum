version: '3.8'

# SmartAlbum 生产环境 Docker Compose 配置
# 部署到腾讯云 Lighthouse Ubuntu 24.04

services:
  redis:
    image: redis:7-alpine
    container_name: smartalbum-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - smartalbum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartalbum-backend
    restart: always
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/smartalbum.db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - DEBUG=false
      - CORS_ORIGINS=http://localhost,http://127.0.0.1
      # AI API 配置（从 .env 文件加载）
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL_NAME=${AI_MODEL_NAME:-GPT-4o}
      - AI_MODEL_ID=${AI_MODEL_ID:-gpt-4o}
      - AI_API_BASE=${AI_API_BASE:-https://api.openai.com/v1}
      # Embedding 配置
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_MODEL_ID=${EMBEDDING_MODEL_ID:-text-embedding-3-small}
      # 腾讯云 COS 配置
      - COS_ENABLED=${COS_ENABLED:-false}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION:-ap-beijing}
      # 火山引擎文生图配置
      - VOLCENGINE_ACCESS_KEY=${VOLCENGINE_ACCESS_KEY}
      - VOLCENGINE_SECRET_KEY=${VOLCENGINE_SECRET_KEY}
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./backend/logs:/app/logs
    networks:
      - smartalbum-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9999/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartalbum-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - smartalbum-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 可选：使用 HTTPS（需要证书）
  # nginx-ssl:
  #   image: nginx:alpine
  #   container_name: smartalbum-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
  #   networks:
  #     - smartalbum-network
  #   depends_on:
  #     - frontend

networks:
  smartalbum-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
